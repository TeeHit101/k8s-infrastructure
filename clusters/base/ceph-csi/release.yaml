apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-rbd
  namespace: ceph-csi
spec:
  interval: 1h
  chart:
    spec:
      chart: ceph-csi-rbd
      version: 4.0.0
      sourceRef:
        kind: HelmRepository
        name: ceph-csi
        namespace: flux-system
      interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    configMap:
      clusterConfig:
        - clusterID: "YOUR_CEPH_FSID"
          monitors:
            - "YOUR_CEPH_MONITOR_IP:6789"
