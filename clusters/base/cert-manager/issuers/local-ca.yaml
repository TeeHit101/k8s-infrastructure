apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-ca-bootstrap
  namespace: cert-manager
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-homelab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: local-homelab-ca
  secretName: local-homelab-ca-key-pair
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-ca-bootstrap
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: local-ca-issuer
spec:
  ca:
    secretName: local-homelab-ca-key-pair
