apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-infrastructure-configs
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: prod-infrastructure
  path: ./clusters/prod/infrastructure-configs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m0s
