version: 2
updates:
  # Enable version updates for Flux / HelmReleases inside the clusters folder
  - package-ecosystem: "flux"
    directory: "/clusters"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
