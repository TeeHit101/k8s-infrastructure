apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-a-deployer
  namespace: tenant-a
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-a-admin-binding
  namespace: tenant-a
subjects:
  - kind: ServiceAccount
    name: tenant-a-deployer
    namespace: tenant-a
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin # Standard admin cluster-role, restricted to this namespace by RoleBinding
