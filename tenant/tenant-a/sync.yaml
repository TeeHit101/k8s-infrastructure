apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: application-config
  namespace: tenant-a
spec:
  interval: 5m0s
  url: https://github.com/TeeHit101/inventory-tracker-config.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: application-config
  namespace: tenant-a
spec:
  interval: 10m0s
  path: ./apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: application-config
  # Enforce tenancy boundaries using the tenant's ServiceAccount
  serviceAccountName: tenant-a-deployer
  # Deploy all resources into the tenant's namespace
  targetNamespace: tenant-a
